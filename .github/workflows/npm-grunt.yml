name: Build GravitRDR (NW.js Binaries)

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Build NW.js binaries
        run: npm run build:nw
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: gravitRDR-osx
          path: build/system-binaries/GravitRDR/osx

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: gravitRDR-win
          path: build/system-binaries/GravitRDR/win

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: gravitRDR-linux
          path: build/system-binaries/GravitRDR/linux

      